# Render Blueprint — single free web service that runs the Socket.IO server AND
# serves the built React client from the same origin (Express already serves
# client/dist). One URL, no separate static host needed.
#
# Deploy: push this repo to GitHub, then on https://render.com →
#   New → Blueprint → pick this repo. Render reads this file automatically.
services:
  - type: web
    name: choose-me
    runtime: node
    plan: free
    # Install both packages and build the client, then start the server.
    buildCommand: npm run render-build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
